<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- The white container with 22% rounded corners -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="#ffffff" />
  
  <!-- The inner SVG scaled to 80% and centered to emulate CSS layout -->
  <svg x="10" y="10" width="80" height="80" viewBox="35 35 145 145">
      <!-- Magnifying Glass Handle -->
      <rect x="145" y="125" width="12" height="40" rx="6" fill="#1e293b" transform="rotate(-45 145 125)" />

      <!-- Left Circle (Navy/Blue) -->
      <circle cx="85" cy="85" r="45" fill="#004080" opacity="0.85" />

      <!-- Right Circle (Teal) -->
      <circle cx="115" cy="85" r="45" fill="#00D1C1" opacity="0.85" />

      <!-- Intersection Star (White) -->
      <path d="M100 68 L104.5 78.5 L115.5 79.5 L107.5 87 L110 98 L100 92 L90 98 L92.5 87 L84.5 79.5 L95.5 78.5 Z" 
            fill="white" 
            stroke-linejoin="round" />
  </svg>
</svg>
